<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Auth Login</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2b0000, #120000, #000000);
      color: #0f172a;
    }

    .card {
      width: 100%;
      max-width: 420px;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #3b0000, #120000, #000000, #4a0000);
      background-size: 300% 300%;
      animation: cardGradientMove 6s ease infinite;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      text-align: center;
      color: #ffffff;
    }

    p.subtitle {
      margin: 0 0 24px;
      text-align: center;
      color: #e2e8f0;
      font-size: 14px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tabs button {
      border: none;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.12);
      color: #f1f5f9;
      transition: 0.2s ease;
    }

    .tabs button.active {
      background: #ffffff;
      color: #1a0000;
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #f8fafc;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.92);
      color: #111827;
    }

    input:focus {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: #7f1d1d;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #991b1b;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }

    @keyframes cardGradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="authBox">
      <h1>Welcome</h1>
      <p class="subtitle">Login or create an account to continue</p>

      <div class="tabs">
        <button id="loginTab" class="active" type="button">Login</button>
        <button id="registerTab" type="button">Register</button>
      </div>

      <form id="loginForm" class="form-section active">
        <div class="field">
          <label for="loginUsername">Username</label>
          <input id="loginUsername" type="text" placeholder="Enter username" required />
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" placeholder="Enter password" required />
        </div>
        <button class="btn" type="submit">Login</button>
      </form>

      <form id="registerForm" class="form-section">
        <div class="field">
          <label for="registerUsername">Username</label>
          <input id="registerUsername" type="text" placeholder="Create username" required />
        </div>
        <div class="field">
          <label for="registerPassword">Password</label>
          <input id="registerPassword" type="password" placeholder="Create password" required />
        </div>
        <button class="btn" type="submit">Create Account</button>
      </form>

      <div id="message" class="message"></div>
    </div>
  </div>

  <script>
    const USERS_KEY = 'local_auth_users';
    const SESSION_KEY = 'local_auth_session';

    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const messageBox = document.getElementById('message');

    function getUsers() {
      return JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
    }

    function saveUsers(users) {
      localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }

    function setSession(username) {
      localStorage.setItem(SESSION_KEY, JSON.stringify({ username }));
    }

    function getSession() {
      return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
    }

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = 'message ' + type;
    }

    function clearMessage() {
      messageBox.textContent = '';
      messageBox.className = 'message';
    }

    function switchTab(tab) {
      clearMessage();

      if (tab === 'login') {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginForm.classList.add('active');
        registerForm.classList.remove('active');
      } else {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        registerForm.classList.add('active');
        loginForm.classList.remove('active');
      }
    }

    function redirectByRole(username) {
      if (username.toLowerCase() === 'admin') {
        window.location.href = 'admin-dashboard.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    }

    const currentSession = getSession();
    if (currentSession && currentSession.username) {
      redirectByRole(currentSession.username);
    }

    loginTab.addEventListener('click', () => switchTab('login'));
    registerTab.addEventListener('click', () => switchTab('register'));

    registerForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const username = document.getElementById('registerUsername').value.trim();
      const password = document.getElementById('registerPassword').value.trim();

      if (!username || !password) {
        showMessage('Please fill in all fields.', 'error');
        return;
      }

      const users = getUsers();
      const exists = users.find(user => user.username === username);

      if (exists) {
        showMessage('Username already exists.', 'error');
        return;
      }

      users.push({ username, password });
      saveUsers(users);

      registerForm.reset();
      switchTab('login');
      showMessage('Account created successfully. You can now log in.', 'success');
    });

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      if (!username || !password) {
        showMessage('Please enter your username and password.', 'error');
        return;
      }

      const users = getUsers();
      const matchedUser = users.find(
        user => user.username === username && user.password === password
      );

      if (!matchedUser) {
        showMessage('Invalid username or password.', 'error');
        return;
      }

      setSession(username);
      loginForm.reset();
      clearMessage();
      redirectByRole(username);
    });
  </script>
</body>
</html>
